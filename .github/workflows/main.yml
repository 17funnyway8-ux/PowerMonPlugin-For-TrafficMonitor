name: Native MSVC Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Plugin
    runs-on: windows-2022

    strategy:
      matrix:
        platform: [Win32, x64, ARM64]
        configuration: [Release]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Solution
        run: |
          msbuild power_mon_plugin.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /m

      - name: Compress Outputs
        shell: pwsh
        run: |
          $platform = "${{ matrix.platform }}"
          $dir = "arch/Release/$platform"
          if ($platform -eq "Win32") {
            $dir = "arch/Release/Win32"
          }
          if (Test-Path $dir) {
            # 移除 LibreHardwareMonitorLib.dll，因为现在是纯原生C++了，不需要这个C#依赖库
            $dllPath = Join-Path $dir "LibreHardwareMonitorLib.dll"
            if (Test-Path $dllPath) {
              Remove-Item $dllPath -Force
            }
            # 压缩该目录下的 DLL 与 PDB 文件
            Compress-Archive -Path "$dir\PowerMonPlugin.dll", "$dir\PowerMonPlugin.pdb" -DestinationPath "PowerMonPlugin-$platform.zip"
          } else {
            Write-Error "Output directory $dir not found!"
            exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PowerMonPlugin-${{ matrix.platform }}
          path: PowerMonPlugin-${{ matrix.platform }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rearrange Artifacts
        run: |
          find artifacts -type f
          mv artifacts/PowerMonPlugin-Win32/PowerMonPlugin-Win32.zip ./PowerMonPlugin-x86.zip
          mv artifacts/PowerMonPlugin-x64/PowerMonPlugin-x64.zip ./PowerMonPlugin-x64.zip
          mv artifacts/PowerMonPlugin-ARM64/PowerMonPlugin-ARM64.zip ./PowerMonPlugin-ARM64.zip

      - name: Release Build Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'latest-build' }}
          name: PowerMonPlugin Native Release - ${{ github.ref_name || 'Latest Commit' }}
          body: |
            ## TrafficMonitor PowerMonPlugin 纯原生 C++ 重构版
            
            本版本为移除了 C++/CLI 托管混合模式及 .NET 运行时依赖的纯 Native 编译版本。
            - 内存开销从 30MB+ 降至 2MB 以下；
            - 解决在 ARM64 和 ARM64EC 等平台下的兼容性闪退问题；
            - 使用原生 SetupAPI/PDH/WMI 及动态加载 NVML/ADL 读取功耗。
          draft: false
          prerelease: false
          files: |
            PowerMonPlugin-x86.zip
            PowerMonPlugin-x64.zip
            PowerMonPlugin-ARM64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
